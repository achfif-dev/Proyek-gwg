name: Build Android APK

# Jalan otomatis tiap push ke branch main, dan juga bisa dipicu manual
# lewat tab "Actions" di GitHub (tombol "Run workflow") tanpa perlu terminal.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (dibutuhkan Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies npm
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Tambahkan platform Android (Capacitor)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            npx cap sync android
          fi

      - name: Sinkronkan aset web ke Android
        run: npx cap sync android

      - name: Simpan folder android/ ke repo (hanya jika baru dibuat/berubah)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add android
          git diff --cached --quiet || git commit -m "chore: sync android/ platform files [skip ci]"
          git push || true

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Jalankan app di emulator & tangkap log error
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb logcat -c
            adb shell am start -n com.gwg.superapp/.MainActivity
            sleep 20
            adb logcat -d > full-log.txt
            grep -i -A 30 "FATAL EXCEPTION\|AndroidRuntime" full-log.txt > crash-log.txt || echo "Tidak ada crash terdeteksi di log" > crash-log.txt

      - name: Upload log crash sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: crash-log
          path: crash-log.txt

      - name: Upload APK sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: gwg-superapp-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
